<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><title>Status da Licença</title><style>body{font-family:Arial;background:#f8f5ec}.box{max-width:920px;margin:40px auto;background:#fff;padding:24px;border-radius:12px}.ok{color:#6B7A2D}.err{color:#9b1c1c}pre{white-space:pre-wrap;background:#eee;padding:12px;border-radius:8px}</style></head><body><div class="box"><h1>Status da Licença Skatlaz</h1><p>Machine fingerprint: <code>{{ machine }}</code></p>{% if license_data %}<h2 class="ok">Ativado</h2><pre>{{ license_data.payload }}</pre><p><a href="/">Abrir sistema</a></p>{% else %}<h2 class="err">Não ativado</h2><p>{{ error }}</p><p><a href="/license/activate/">Ativar agora</a></p>{% endif %}</div></body></html>
